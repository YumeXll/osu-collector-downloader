<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>osu!Collector Downloader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e1e8ed;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      outline: none;
      border-color: #667eea;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-download {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-download:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-download:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-clear {
      background: #f0f2f5;
      color: #333;
    }

    .btn-clear:hover:not(:disabled) {
      background: #e4e6eb;
    }

    .progress-section {
      display: none;
      margin-bottom: 20px;
    }

    .progress-section.active {
      display: block;
    }

    .progress-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e1e8ed;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      width: 0%;
      transition: width 0.3s;
    }

    .progress-text {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
    }

    .status-message {
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .status-message.info {
      background: #e3f2fd;
      color: #1976d2;
      border: 1px solid #bbdefb;
    }

    .status-message.success {
      background: #e8f5e9;
      color: #388e3c;
      border: 1px solid #c8e6c9;
    }

    .status-message.error {
      background: #ffebee;
      color: #d32f2f;
      border: 1px solid #ffcdd2;
    }

    .download-link {
      text-align: center;
      margin-bottom: 10px;
    }

    .download-link a {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s;
    }

    .download-link a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .error-list {
      background: #ffebee;
      border: 1px solid #ffcdd2;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 10px;
      max-height: 150px;
      overflow-y: auto;
    }

    .error-list h4 {
      color: #d32f2f;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .error-item {
      color: #c62828;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .info-text {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎵 osu!Collector Downloader</h1>
      <p>Download beatmap collections from osu!Collector</p>
    </div>

    <div class="form-group">
      <label for="collectionId">Collection ID:</label>
      <input type="number" id="collectionId" placeholder="e.g., 12345" min="1">
    </div>

    <div class="button-group">
      <button class="btn-download" id="downloadBtn">Start Download</button>
      <button class="btn-clear" id="clearBtn">Clear</button>
    </div>

    <div class="progress-section" id="progressSection">
      <div class="progress-title">
        <span class="spinner"></span>Downloading...
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 0 beatmaps</div>

      <div id="statusContainer"></div>

      <div id="errorList" class="error-list" style="display: none;">
        <h4>Download Errors</h4>
        <div id="errorItems"></div>
      </div>

      <div id="downloadLink" class="download-link" style="display: none;"></div>
    </div>

    <div class="info-text">
      Collection will be downloaded as a ZIP file.<br>
      No login or authentication required.
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
